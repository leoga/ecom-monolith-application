spring.application.name=ecom-application
#spring.h2.console.enabled=true
#spring.datasource.url=jdbc:h2:mem:testdb
#spring.jpa.show-sql=true
spring.datasource.url=jdbc:postgresql://localhost:5432/leoga
spring.datasource.username=leoga
spring.datasource.password=leoga
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
management.endpoints.web.exposure.include=health, info, metrics, beans
management.endpoint.health.show-details=always
#management.endpoint.shutdown.enabled=true
management.info.env.enabled=true
info.app.name=My Ecom Application
info.app.description=Application for an ecom project
info.app.version=1.0.0
#server.shutdown=graceful